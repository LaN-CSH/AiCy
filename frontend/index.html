<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AiCy Viewer</title>

  <!-- Cubism 4 Core (Live2D official) -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <!-- PixiJS 6.5 (pixi-live2d-display compatible) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
  <!-- pixi-live2d-display (Cubism 4) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism4.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #0d0d1a;
      font-family: 'Segoe UI', sans-serif;
      color: #e0e0e0;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #status-bar {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(15, 15, 30, 0.85);
      border: 1px solid rgba(100, 120, 255, 0.25);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      line-height: 1.6;
      backdrop-filter: blur(8px);
      min-width: 200px;
      z-index: 10;
    }

    #status-bar .title {
      font-weight: 700;
      font-size: 15px;
      color: #8892ff;
      margin-bottom: 4px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .status-row .label { color: #888; }

    .status-row .value { color: #ccc; font-weight: 500; }
    .status-row .value.ok { color: #6fdc6f; }
    .status-row .value.warn { color: #f0c040; }
    .status-row .value.err { color: #f06060; }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .btn {
      background: rgba(100, 120, 255, 0.2);
      border: 1px solid rgba(100, 120, 255, 0.4);
      color: #b0b8ff;
      padding: 10px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    .btn:hover {
      background: rgba(100, 120, 255, 0.35);
      border-color: rgba(100, 120, 255, 0.6);
      color: #fff;
    }

    .btn:active { transform: scale(0.96); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(100, 120, 255, 0.2);
      border-top-color: #6878ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      margin-top: 16px;
      color: #888;
      font-size: 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #caption {
      position: fixed;
      bottom: 130px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 70vw;
      padding: 10px 18px;
      border-radius: 10px;
      background: rgba(15, 15, 30, 0.75);
      color: #fff;
      font-size: 16px;
      line-height: 1.5;
      text-align: center;
      backdrop-filter: blur(6px);
      z-index: 9;
      display: none;
    }

    /* --- 왼쪽 사이드: 위(내 채팅) / 아래(방송 채팅) 2단 --- */
    #side-panels {
      position: fixed;
      top: 16px;
      left: 16px;
      bottom: 16px;
      width: 300px;
      max-width: 80vw;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: rgba(15, 15, 30, 0.85);
      border: 1px solid rgba(100, 120, 255, 0.25);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      overflow: hidden;
    }

    .panel-header {
      padding: 10px 14px;
      font-weight: 700;
      font-size: 14px;
      color: #8892ff;
      border-bottom: 1px solid rgba(100, 120, 255, 0.15);
    }

    .panel-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(100, 120, 255, 0.3) transparent;
    }

    /* 방송 채팅(아래 패널) 전용 스타일 */
    .live-msg {
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .live-msg .nick { color: #8892ff; font-weight: 700; margin-right: 6px; }
    .live-msg.aicy-reply {
      background: rgba(100, 120, 255, 0.15);
      border-left: 3px solid #8892ff;
      border-radius: 6px;
      padding: 6px 10px;
    }
    .live-msg.aicy-reply .nick { color: #b0b8ff; }

    .msg {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(100, 120, 255, 0.35);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.aicy {
      align-self: flex-start;
      background: rgba(255, 255, 255, 0.08);
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .msg.aicy.pending {
      opacity: 0.6;
      font-style: italic;
    }

    #chat-input-row {
      display: flex;
      gap: 6px;
      padding: 10px;
      border-top: 1px solid rgba(100, 120, 255, 0.15);
    }

    #chat-input {
      flex: 1;
      min-width: 0;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(100, 120, 255, 0.4);
      background: rgba(15, 15, 30, 0.85);
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    #chat-input:focus { border-color: rgba(100, 120, 255, 0.8); }

    /* [H] 키로 방송용 UI 숨김 (자막은 유지) */
    body.ui-hidden #status-bar,
    body.ui-hidden #controls,
    body.ui-hidden #side-panels { display: none; }

    /* ?chat=1 — 방송 화면에 Live Chat 패널만 표시 (내 채팅/입력창은 숨김) */
    body.ui-hidden.chat-overlay #side-panels { display: flex; }
    body.ui-hidden.chat-overlay #chat-panel { display: none; }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading Live2D model...</div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="status-bar">
    <div class="title">AiCy Viewer</div>
    <div class="status-row">
      <span class="label">Model</span>
      <span class="value" id="st-model">loading...</span>
    </div>
    <div class="status-row">
      <span class="label">State</span>
      <span class="value" id="st-state">-</span>
    </div>
    <div class="status-row">
      <span class="label">Lip Sync</span>
      <span class="value" id="st-lipsync">off</span>
    </div>
    <div class="status-row">
      <span class="label">Backend</span>
      <span class="value" id="st-ws">disconnected</span>
    </div>
    <div class="status-row">
      <span class="label">TTS</span>
      <span class="value" id="st-tts">-</span>
    </div>
  </div>

  <div id="caption"></div>

  <div id="side-panels">
    <div class="panel" id="chat-panel">
      <div class="panel-header">AiCy Chat (나)</div>
      <div class="panel-messages" id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="AiCy에게 말 걸기... (Enter)" autocomplete="off" />
        <button class="btn" id="chat-send">Send</button>
      </div>
    </div>
    <div class="panel" id="live-panel">
      <div class="panel-header">Live Chat (방송)</div>
      <div class="panel-messages" id="live-messages"></div>
    </div>
  </div>

  <div id="controls">
    <button class="btn" id="btn-speak" disabled
      title="고정 샘플(audio/tts-audio.mp3) 재생 — 백엔드 TTS와 무관한 립싱크 테스트">Test Speak</button>
    <button class="btn" id="btn-motion" disabled>Random Motion</button>
    <button class="btn" id="btn-expression" disabled>Expression</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
